name: security-scan

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_validation:
    name: Security Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      REQUIRE_SECURITY_TOOLS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Semgrep SAST scan
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep
          mkdir -p artifacts/security
          semgrep scan --config auto --severity ERROR --sarif --output artifacts/security/semgrep.sarif --error

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/security/semgrep.sarif

      - name: JavaScript dependency audit
        run: pnpm audit --audit-level high

      - name: Security runtime validation (Trivy/TruffleHog/Syft)
        run: bash scripts/security/run_security_validation.sh

      - name: Go vulnerability baseline
        run: bash scripts/security/run_govulncheck.sh

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          if-no-files-found: ignore
          path: |
            artifacts/security/**
            sbom.spdx.json
