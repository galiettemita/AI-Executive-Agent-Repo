syntax = "proto3";

package brevio.brain.v1;

import "brevio/common/v1/common.proto";

service BrainService {
  rpc ClassifyIntent (ClassifyIntentRequest) returns (ClassifyIntentResponse);
  rpc DisambiguateSkills (DisambiguateSkillsRequest) returns (DisambiguateSkillsResponse);
  rpc DecomposeTask (DecomposeTaskRequest) returns (DecomposeTaskResponse);
  rpc AggregateResults (AggregateResultsRequest) returns (AggregateResultsResponse);
  rpc ProcessTurn (ProcessTurnRequest) returns (ProcessTurnResponse);
  rpc Health (BrainServiceHealthRequest) returns (BrainServiceHealthResponse);
}

message ClassifyIntentRequest {
  brevio.common.v1.MessageEnvelope envelope = 1;
}

message ClassifyIntentResponse {
  string intent = 1;
  double confidence = 2;
  repeated string skills = 3;
  bool requires_decomposition = 4;
  string reasoning = 5;
  bool clarification_required = 6;
  repeated string blocked_skills = 7;
  string safe_reasoning = 8;
}

message DisambiguateSkillsRequest {
  brevio.common.v1.MessageEnvelope envelope = 1;
  repeated string candidate_skills = 2;
  string deployment_mode = 3;
  string user_tier = 4;
  map<string, string> user_preferences = 5;
  repeated string enabled_skills = 6;
}

message DisambiguateSkillsResponse {
  repeated string resolved_skills = 1;
  repeated string group_hits = 2;
  repeated string blocked_skills = 3;
  bool clarification_required = 4;
  repeated string reasoning = 5;
}

message DecomposeTaskRequest {
  brevio.common.v1.MessageEnvelope envelope = 1;
}

message DecomposeTaskResponse {
  string task_graph_json = 1;
  repeated string skill_ids = 2;
}

message AggregateResultsRequest {
  brevio.common.v1.MessageEnvelope envelope = 1;
  repeated brevio.common.v1.SkillResult results = 2;
}

message AggregateResultsResponse {
  string response_text = 1;
  repeated string suggested_actions = 2;
  bool follow_up_scheduled = 3;
  double completion_ratio = 4;
  repeated string warnings = 5;
}

message ProcessTurnRequest {
  brevio.common.v1.MessageEnvelope envelope = 1;
  repeated brevio.common.v1.SkillResult results = 2;
}

message ProcessTurnResponse {
  string classification_json = 1;
  string disambiguation_json = 2;
  string decomposition_json = 3;
  string plan_json = 4;
  string verification_json = 5;
  string aggregation_json = 6;
  string execution_status = 7;
  string policy_summary_json = 8;
  string user_safe_summary = 9;
}

message BrainServiceHealthRequest {
  bool deep = 1;
}

message BrainServiceHealthResponse {
  string status = 1;
  string version = 2;
  int64 uptime_ms = 3;
  map<string, string> checks = 4;
}
