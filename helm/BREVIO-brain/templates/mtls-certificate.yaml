{{- if .Values.mtls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: brevio-brain-mtls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: brevio-brain-mtls-tls
  duration: {{ .Values.mtls.duration | quote }}
  renewBefore: {{ .Values.mtls.renewBefore | quote }}
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.mtls.issuerName }}
    kind: {{ .Values.mtls.issuerKind }}
  commonName: brain.brevio.internal
  dnsNames:
    - brain.brevio.internal
{{- end }}

