syntax = "proto3";

package brevio.auth.v1;

service AuthService {
  rpc GetOAuthToken (GetOAuthTokenRequest) returns (GetOAuthTokenResponse);
  rpc RefreshOAuthToken (RefreshOAuthTokenRequest) returns (RefreshOAuthTokenResponse);
  rpc Health (AuthServiceHealthRequest) returns (AuthServiceHealthResponse);
}

message GetOAuthTokenRequest {
  string user_id = 1;
  string service = 2;
}

message GetOAuthTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  string expires_at = 3;
  repeated string scopes = 4;
}

message RefreshOAuthTokenRequest {
  string user_id = 1;
  string service = 2;
}

message RefreshOAuthTokenResponse {
  bool refreshed = 1;
  string access_token = 2;
  string expires_at = 3;
}

message AuthServiceHealthRequest {
  bool deep = 1;
}

message AuthServiceHealthResponse {
  string status = 1;
  string version = 2;
  int64 uptime_ms = 3;
  map<string, string> checks = 4;
}
