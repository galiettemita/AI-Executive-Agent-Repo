{{- range $serviceName, $config := .Values.autoscaling }}
{{- if $config.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "brevio.fullname" $ }}-{{ $serviceName }}
  labels:
    {{- include "brevio.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "brevio.fullname" $ }}-{{ $serviceName }}
  minReplicas: {{ $config.minReplicas | default 2 }}
  maxReplicas: {{ $config.maxReplicas | default 10 }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $config.targetCPUUtilization | default 70 }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ $config.targetMemoryUtilization | default 80 }}
  {{- if $config.customMetrics }}
  - type: External
    external:
      metric:
        name: temporal_workflow_queue_depth
        selector:
          matchLabels:
            queue: brevio-main
      target:
        type: AverageValue
        averageValue: {{ $config.customMetrics.queueDepthTarget | default "100" }}
  {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
{{- end }}
{{- end }}
