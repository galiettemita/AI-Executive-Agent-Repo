name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: gofmt check
        run: test -z "$(gofmt -l .)"
      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.5.1
          staticcheck ./...
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: unit tests
        run: go test ./... -count=1
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: install infrastructure and security tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar unzip

          TERRAFORM_VERSION=1.9.8
          wget -q "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          unzip -q "terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
          sudo mv terraform /usr/local/bin/terraform

          HELM_VERSION=v3.16.4
          wget -q "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf "helm-${HELM_VERSION}-linux-amd64.tar.gz"
          sudo mv linux-amd64/helm /usr/local/bin/helm

          TRIVY_VERSION=0.53.0
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          tar -xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy

          go install github.com/trufflesecurity/trufflehog/v3@v3.90.4
          sudo ln -sf "$(go env GOPATH)/bin/trufflehog" /usr/local/bin/trufflehog

          SYFT_VERSION=1.20.0
          wget -q "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
          sudo mv syft /usr/local/bin/syft

          terraform version
          helm version
          trivy --version
          trufflehog --version
          syft version
      - name: migration lint
        run: |
          test -f db/migrations/001_BREVIO_v9_init.sql
          test -f db/migrations/002_BREVIO_v91_soft_intelligence.sql
          test -f db/migrations/003_BREVIO_v92_production_hardening.sql
          rg -n "CREATE TYPE" db/migrations/001_BREVIO_v9_init.sql
          rg -n "CREATE TYPE" db/migrations/002_BREVIO_v91_soft_intelligence.sql
          rg -n "CREATE TYPE" db/migrations/003_BREVIO_v92_production_hardening.sql
      - name: openapi lint
        run: go test ./internal/contracts -run TestOpenAPIV9EndpointParityClosure -count=1
      - name: json schema lint
        run: go test ./internal/contracts -run TestJSONSchemaClosure -count=1
      - name: infrastructure validate
        run: bash scripts/infra/validate.sh
      - name: determinism suite
        run: go test ./internal/llm ./internal/workflows -count=1
      - name: dependency cve scan (trivy)
        run: trivy fs --scanners vuln --severity CRITICAL,HIGH --exit-code 1 .
      - name: docker image scan (trivy)
        run: trivy fs --scanners vuln --severity CRITICAL,HIGH --exit-code 1 .
      - name: secrets scan (trufflehog)
        run: trufflehog filesystem . --fail
      - name: govulncheck baseline
        run: bash scripts/security/run_govulncheck.sh
      - name: contract tests
        run: go test ./internal/contracts -count=1
      - name: integration tests
        run: go test ./internal/integration -count=1
      - name: prompt injection tests
        run: go test ./internal/control -count=1
      - name: webhook signature suite
        run: go test ./internal/gateway -count=1
      - name: provisioning compensation suite
        run: go test ./internal/workflows ./internal/provisioning -count=1
      - name: onboarding fixture suite
        run: go test ./internal/onboarding -count=1
      - name: sbom generation (syft)
        run: |
          syft dir:. -o spdx-json > sbom.spdx.json
          test -s sbom.spdx.json
      - name: migration closure gates
        run: go test ./internal/database -run TestMigration -count=1
      - name: prompt/compliance closure gates
        run: go test ./internal/contracts -run "TestPromptSeedClosure|TestComplianceMatrixClosure" -count=1
      - name: policy/event/metric closure gates
        run: go test ./internal/contracts -run "TestPolicyRuleClosure|TestCanonicalEventsAndMetricsClosure" -count=1
      - name: infrastructure closure gates
        run: go test ./internal/contracts -run "TestV92InfrastructureArtifactsExist|TestV92RunbooksExist" -count=1
      - name: context budget validation
        run: go test ./internal/context -count=1
      - name: rag pipeline tests
        run: go test ./internal/rag -count=1
      - name: rag eval gate
        run: go test ./internal/rag/eval -count=1
      - name: session management tests
        run: go test ./internal/sessions -count=1
      - name: temporal reasoning tests
        run: go test ./internal/temporal_reasoning -count=1
      - name: guardrails tests
        run: go test ./internal/guardrails -count=1
      - name: tool health tests
        run: go test ./internal/tool_health -count=1
      - name: feature flag tests
        run: go test ./internal/feature_flags -count=1
      - name: crdt tests
        run: go test ./internal/crdt -count=1
      - name: streaming sla tests
        run: go test ./internal/streaming -count=1
      - name: error taxonomy tests
        run: go test ./internal/errors -count=1
      - name: event schema compat
        run: go test ./internal/event_schemas -count=1
      - name: compliance tests
        run: go test ./internal/compliance -count=1
      - name: admin api tests
        run: go test ./internal/admin -count=1
      - name: pii encryption tests
        run: go test ./internal/security/pii -count=1
      - name: mcp sandbox tests
        run: go test ./internal/security/sandbox -count=1
      - name: cache layer tests
        run: go test ./internal/caching -count=1
      - name: model tier policy tests
        run: go test ./internal/model_tiers -count=1
