{{- if .Values.karpenter.enabled }}
---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: brevio-general
spec:
  template:
    metadata:
      labels:
        managed-by: karpenter
        cluster: {{ .Values.clusterName }}
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: brevio-node-class
      requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand", "spot"]
      - key: node.kubernetes.io/instance-type
        operator: In
        values: ["m7g.large", "m7g.xlarge", "m7g.2xlarge", "m6i.large", "m6i.xlarge"]
      - key: kubernetes.io/arch
        operator: In
        values: ["arm64", "amd64"]
  limits:
    cpu: 1000
    memory: 4000Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: brevio-node-class
spec:
  amiFamily: AL2
  role: {{ .Values.karpenter.nodeRoleName }}
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: {{ .Values.clusterName }}
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: {{ .Values.clusterName }}
  blockDeviceMappings:
  - deviceName: /dev/xvda
    ebs:
      volumeSize: 50Gi
      volumeType: gp3
      encrypted: true
      iops: 3000
      throughput: 125
{{- end }}
