---
# Brain service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: brain
  namespace: brevio
spec:
  hosts:
    - brain
  http:
    - retries:
        attempts: 3
        perTryTimeout: 30s
        retryOn: "5xx,reset,connect-failure"
      timeout: 90s
      route:
        - destination:
            host: brain
            port:
              number: 8080
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: brain
  namespace: brevio
spec:
  host: brain
  trafficPolicy:
    connectionPool:
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# Gateway service
