name: deploy-staging
on:
  workflow_dispatch:
  workflow_run:
    workflows: [ci-openclaw]
    types: [completed]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION != '' && env.AWS_REGION || 'us-east-1' }}
      - name: Configure AWS credentials (access key fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION != '' && env.AWS_REGION || 'us-east-1' }}
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "KUBE_CONFIG_STAGING not set; skipping staging deploy."
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          if printf '%s' "${KUBE_CONFIG_STAGING}" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Loaded base64-encoded staging kubeconfig secret."
          else
            printf '%s' "${KUBE_CONFIG_STAGING}" > "$HOME/.kube/config"
            echo "KUBE_CONFIG_STAGING not valid base64; loaded raw kubeconfig content."
          fi
          if grep -q "command: aws" "$HOME/.kube/config"; then
            if ! command -v aws >/dev/null 2>&1; then
              echo "aws CLI is required by kubeconfig exec auth but is not available." >&2
              exit 1
            fi
            if ! aws sts get-caller-identity >/dev/null 2>&1; then
              echo "EKS kubeconfig requires AWS credentials. Configure AWS_ROLE_TO_ASSUME (preferred) or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets." >&2
              exit 1
            fi
          fi
          kubectl config current-context >/dev/null
      - name: Deploy staging
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
          WAIT_FOR_ROLLOUT: "true"
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "KUBE_CONFIG_STAGING not set; skipping staging deploy."
            exit 0
          fi
          bash scripts/deploy/helm_rollout.sh
      - name: Staging smoke tests
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "KUBE_CONFIG_STAGING not set; skipping staging smoke tests."
            exit 0
          fi
          bash scripts/deploy/run_staging_smoke_tests.sh
      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-artifacts-${{ github.run_id }}
          path: artifacts/deploy/staging_smoke_test_report.json
          if-no-files-found: warn
