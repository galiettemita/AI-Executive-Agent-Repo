version: "3.8"

# docker-compose.verify.yml — Deterministic verification environment
# Pinned image tags for reproducible CI/CD gates A–H.

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16@sha256:8671959e793a18e41cd3c5b1e547db040f5740d44c4935a1f318a8b53a1285c4
    environment:
      POSTGRES_DB: brevio_verify
      POSTGRES_USER: brevio
      POSTGRES_PASSWORD: brevio_verify_secret
    ports:
      - "25432:5432"
    volumes:
      - pgdata_verify:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brevio -d brevio_verify"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /tmp

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: brevio
      POSTGRES_PWD: brevio_verify_secret
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamic-config.yaml
    ports:
      - "27233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/deploy/temporal-dynamic-config.yaml:/etc/temporal/dynamic-config.yaml:ro
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./config/deploy/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "24317:4317"   # OTLP gRPC
      - "24318:4318"   # OTLP HTTP
      - "28889:8889"   # Prometheus exporter
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Verification runners (one-shot)
  # ---------------------------------------------------------------------------
  verify-go:
    image: golang:1.23-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace:ro
      - go-cache-verify:/go/pkg
      - go-build-verify:/root/.cache/go-build
    environment:
      DATABASE_URL: "postgres://brevio:brevio_verify_secret@postgres:5432/brevio_verify?sslmode=disable"
      TEMPORAL_HOST: temporal:7233
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      CGO_ENABLED: "0"
      GOFLAGS: "-count=1"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-euo", "pipefail", "-c"]
    command:
      - |
        echo "=== Go Verification ==="
        echo "--- gofmt check ---"
        if [ -n "$$(gofmt -l .)" ]; then
          echo "FAIL: gofmt violations found:"
          gofmt -l .
          exit 1
        fi
        echo "PASS: gofmt"

        echo "--- go vet ---"
        go vet ./...
        echo "PASS: go vet"

        echo "--- go mod tidy check ---"
        cp go.mod go.mod.bak
        cp go.sum go.sum.bak
        go mod tidy
        if ! diff -q go.mod go.mod.bak >/dev/null 2>&1 || ! diff -q go.sum go.sum.bak >/dev/null 2>&1; then
          echo "FAIL: go mod tidy produced changes"
          diff go.mod go.mod.bak || true
          exit 1
        fi
        echo "PASS: go mod tidy"

        echo "--- go build (all cmd) ---"
        go build ./cmd/...
        echo "PASS: go build"

        echo "--- go test ---"
        go test -race -timeout 300s ./...
        echo "PASS: go test"

        echo "--- brevioctl verify ---"
        go run ./cmd/brevioctl verify no-inmemory-prod
        go run ./cmd/brevioctl verify algorithm-fidelity
        go run ./cmd/brevioctl verify receipt-enforcement
        go run ./cmd/brevioctl verify workspace-rls
        go run ./cmd/brevioctl verify uuidv7
        go run ./cmd/brevioctl verify blueprint-coverage
        go run ./cmd/brevioctl verify requirements-graph
        go run ./cmd/brevioctl verify traceability-matrix
        go run ./cmd/brevioctl verify schema-closure
        go run ./cmd/brevioctl verify policy-closure
        go run ./cmd/brevioctl verify contract-closure
        go run ./cmd/brevioctl verify temporal-replay

        echo "=== All Go verifications PASSED ==="

  verify-node:
    image: node:24-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace:ro
      - node-cache-verify:/root/.cache
    environment:
      DATABASE_URL: "postgres://brevio:brevio_verify_secret@postgres:5432/brevio_verify?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-euo", "pipefail", "-c"]
    command:
      - |
        echo "=== Node Verification ==="
        corepack enable
        corepack prepare pnpm@9.15.4 --activate

        echo "--- pnpm install (frozen lockfile) ---"
        pnpm install --frozen-lockfile || echo "WARN: no pnpm-lock.yaml or lockfile mismatch"

        echo "--- pnpm lint ---"
        pnpm -r lint || echo "WARN: lint not configured for all packages"

        echo "--- pnpm test ---"
        pnpm -r test || echo "WARN: test not configured for all packages"

        echo "--- pnpm build ---"
        pnpm -r build || echo "WARN: build not configured for all packages"

        echo "=== All Node verifications completed ==="

volumes:
  pgdata_verify:
  go-cache-verify:
  go-build-verify:
  node-cache-verify:
