name: llm-evals

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'config/prompt-templates/**'
      - 'tests/evals/**'
      - 'scripts/run-evals.sh'
      - '.github/workflows/llm-evals.yml'
  push:
    branches: [main, codex/**]
    paths:
      - 'config/prompt-templates/**'
      - 'tests/evals/**'
      - 'scripts/run-evals.sh'
      - '.github/workflows/llm-evals.yml'

concurrency:
  group: llm-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_llm_evals:
    name: Run LLM Eval Harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EVAL_BUDGET_CAP_USD: "25"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute eval harness
        run: bash scripts/run-evals.sh

      - name: Capture latest eval result
        id: latest_result
        run: |
          latest="$(find tests/evals/results -maxdepth 1 -type f -name 'eval-*.json' | sort | tail -n1)"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-eval-results
          if-no-files-found: error
          path: |
            ${{ steps.latest_result.outputs.latest }}
            tests/evals/baselines/baseline.json
