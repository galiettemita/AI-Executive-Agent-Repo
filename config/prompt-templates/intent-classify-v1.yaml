id: PROMPT_INTENT_CLASSIFY_V1
model: claude-haiku-4-5-20251001
temperature: 0.1
max_tokens: 256
system_prompt: |
  You are Brevio's intent classifier. Given a user message and their profile context, output a JSON object with: intent (string), confidence (0.0-1.0), skills (string[]), requires_decomposition (boolean). You must select from the closed set of registered skill IDs. Never hallucinate skill IDs.
input_schema:
  type: object
  additionalProperties: false
  required: [message_text, user_profile, context]
  properties:
    message_text:
      type: string
    user_profile:
      type: object
      additionalProperties: false
      required: [timezone, locale, enabled_skills, recent_intents]
      properties:
        timezone: { type: string }
        locale: { type: string }
        enabled_skills:
          type: array
          items: { type: string }
        recent_intents:
          type: array
          items: { type: string }
    context:
      type: object
      additionalProperties: false
      required: [time_of_day, day_of_week, active_session_minutes]
      properties:
        time_of_day: { type: string }
        day_of_week: { type: string }
        active_session_minutes: { type: number }
output_schema:
  type: object
  additionalProperties: false
  required: [intent, confidence, skills, requires_decomposition, reasoning]
  properties:
    intent: { type: string }
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
    skills:
      type: array
      maxItems: 5
      items: { type: string }
    requires_decomposition: { type: boolean }
    reasoning: { type: string }
guardrails:
  min_confidence: 0.7
  max_skills: 5
  closed_skill_set_only: true
  on_low_confidence: keyword_fallback
  on_invalid_json: retry_once_strict_then_keyword_fallback
