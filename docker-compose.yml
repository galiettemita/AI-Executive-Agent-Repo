version: '3.9'
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: brevio
      POSTGRES_PASSWORD: brevio
      POSTGRES_DB: brevio
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=brevio
      - POSTGRES_PWD=brevio
      - POSTGRES_SEEDS=postgres
    ports:
      - '7233:7233'

  gateway:
    image: golang:1.22
    command: ["sleep", "infinity"]
    depends_on: [postgres, redis]
