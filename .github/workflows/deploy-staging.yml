name: Deploy (Staging)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "app/**"
      - "infra/**"
      - "scripts/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/deploy-staging.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve stack outputs
        id: sst
        run: |
          set -euo pipefail

          STAGE="staging"
          ECS_STACK="${STAGE}-executive-os-EcsStack"
          NET_STACK="${STAGE}-executive-os-NetworkStack"

          CLUSTER="$(aws cloudformation describe-stacks --stack-name "$ECS_STACK" --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" --output text)"
          GATEWAY_REPO="$(aws cloudformation describe-stacks --stack-name "$ECS_STACK" --query "Stacks[0].Outputs[?OutputKey=='GatewayRepo'].OutputValue" --output text)"
          BRAIN_REPO="$(aws cloudformation describe-stacks --stack-name "$ECS_STACK" --query "Stacks[0].Outputs[?OutputKey=='BrainRepo'].OutputValue" --output text)"
          HANDS_REPO="$(aws cloudformation describe-stacks --stack-name "$ECS_STACK" --query "Stacks[0].Outputs[?OutputKey=='HandsRepo'].OutputValue" --output text)"
          WORKERS_REPO="$(aws cloudformation describe-stacks --stack-name "$ECS_STACK" --query "Stacks[0].Outputs[?OutputKey=='WorkersRepo'].OutputValue" --output text)"
          ALB_DNS="$(aws cloudformation describe-stacks --stack-name "$NET_STACK" --query "Stacks[0].Outputs[?OutputKey=='AlbDnsName'].OutputValue" --output text)"

          echo "cluster=$CLUSTER" >> "$GITHUB_OUTPUT"
          echo "gateway_repo=$GATEWAY_REPO" >> "$GITHUB_OUTPUT"
          echo "brain_repo=$BRAIN_REPO" >> "$GITHUB_OUTPUT"
          echo "hands_repo=$HANDS_REPO" >> "$GITHUB_OUTPUT"
          echo "workers_repo=$WORKERS_REPO" >> "$GITHUB_OUTPUT"
          echo "alb_dns=$ALB_DNS" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          set -euo pipefail
          docker build -t executive-os:${{ github.sha }} .

      - name: Tag + push images to ECR (latest)
        run: |
          set -euo pipefail

          for repo in \
            "${{ steps.sst.outputs.gateway_repo }}" \
            "${{ steps.sst.outputs.brain_repo }}" \
            "${{ steps.sst.outputs.hands_repo }}" \
            "${{ steps.sst.outputs.workers_repo }}"; do
            echo "Pushing $repo:latest"
            docker tag "executive-os:${{ github.sha }}" "$repo:latest"
            docker push "$repo:latest"
          done

      - name: Force new ECS deployment (all services in cluster)
        run: |
          set -euo pipefail

          CLUSTER="${{ steps.sst.outputs.cluster }}"
          SERVICES="$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns[]" --output text)"

          if [ -z "$SERVICES" ]; then
            echo "No services found in cluster: $CLUSTER"
            exit 1
          fi

          for svc in $SERVICES; do
            echo "Redeploying $svc"
            aws ecs update-service --cluster "$CLUSTER" --service "$svc" --force-new-deployment >/dev/null
          done

          aws ecs wait services-stable --cluster "$CLUSTER" --services $SERVICES

      - name: Smoke check (ALB /health)
        run: |
          set -euo pipefail
          ALB_DNS="${{ steps.sst.outputs.alb_dns }}"
          curl -f -I --max-time 15 "http://${ALB_DNS}/health"
