      targetCPUUtilizationPercentage: 70
  memory-svc:
    enabled: true
    replicaCount: 2
    containerPort: 18093
    servicePort: 18093
    image:
      repository: ghcr.io/brevio/memory
      tag: v9.3.0
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
  router:
    enabled: true
    replicaCount: 2
    containerPort: 18094
    servicePort: 18094
    image:
      repository: ghcr.io/brevio/router
      tag: v9.3.0
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
  cron:
