    canonical: apple-notes-skill
    aliases: [apple-notes]
  - group: notion
    canonical: better-notion
    fallback: notion
  - group: spotify
    cloud: spotify-web-api
    local_mac: spotify
    terminal: spotify-player
    analytics: spotify-history
  - group: flight-tracking
    track: aviationstack-flight-tracker
    find: aerobase-skill
    free_tier: flight-tracker
  - group: healthkit
    canonical: healthkit-sync-apple
    aliases: [healthkit-sync]
  - group: apple-mail
    crud: apple-mail
