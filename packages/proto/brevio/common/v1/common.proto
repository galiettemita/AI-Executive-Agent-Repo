syntax = "proto3";

package brevio.common.v1;

message MessageEnvelope {
  string id = 1;
  string channel = 2;
  string user_id = 3;
  string timestamp = 4;
  string content_type = 5;
  string content_text = 6;
  string content_media_url = 7;
  int32 voice_duration_ms = 8;
  string channel_message_id = 9;
  string session_id = 10;
  string user_profile_hash = 11;
  repeated string active_skills = 12;
  string intent = 13;
  repeated string skill_ids = 14;
  string task_graph_json = 15;
}

message SkillError {
  string code = 1;
  string message = 2;
  bool retryable = 3;
  int32 http_status = 4;
}

message SkillMetadata {
  int32 retries = 1;
  string circuit_breaker_state = 2;
  bool cache_hit = 3;
}

message SkillResult {
  string request_id = 9;
  string run_id = 10;
  string task_id = 11;
  string step_id = 12;
  int32 attempt = 13;
  repeated string artifact_ids = 14;
  string skill_id = 1;
  string status = 2;
  string data_json = 3;
  SkillError error = 4;
  int32 latency_ms = 5;
  int32 tokens_used = 6;
  double cost_cents = 7;
  SkillMetadata metadata = 8;
}

message HealthRequest {
  bool deep = 1;
}

message HealthResponse {
  string status = 1;
  string version = 2;
  int64 uptime_ms = 3;
  map<string, string> checks = 4;
}
