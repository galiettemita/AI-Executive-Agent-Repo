version: 1
description: Section 33 alert thresholds for runtime SLO and error posture.
alerts:
  - alert_key: brevio_t1_latency_p95_breach
    metric: BREVIO_interactive_turn_latency_t1_ms_p95
    threshold: 2500
    operator: ">"
    evaluation_window: 5m
    severity: high
    action: page_primary_on_call
  - alert_key: brevio_t2_latency_p95_breach
    metric: BREVIO_interactive_turn_latency_t2_ms_p95
    threshold: 6000
    operator: ">"
    evaluation_window: 5m
    severity: high
    action: page_primary_on_call
  - alert_key: brevio_t3_latency_p95_breach
    metric: BREVIO_interactive_turn_latency_t3_ms_p95
    threshold: 20000
    operator: ">"
    evaluation_window: 10m
    severity: high
    action: page_primary_on_call
  - alert_key: brevio_error_rate_breach
    metric: BREVIO_error_rate_pct
    threshold: 0.5
    operator: ">"
    evaluation_window: 5m
    severity: critical
    action: page_primary_on_call
  - alert_key: brevio_gateway_availability_breach
    metric: BREVIO_gateway_availability_pct
    threshold: 99.95
    operator: "<"
    evaluation_window: 15m
    severity: critical
    action: page_primary_on_call
  - alert_key: brevio_control_availability_breach
    metric: BREVIO_control_availability_pct
    threshold: 99.90
    operator: "<"
    evaluation_window: 15m
    severity: high
    action: page_primary_on_call
  - alert_key: brevio_brain_availability_breach
    metric: BREVIO_brain_availability_pct
    threshold: 99.90
    operator: "<"
    evaluation_window: 15m
    severity: high
    action: page_primary_on_call
  - alert_key: brevio_provider_failover_spike
    metric: BREVIO_provider_failover_total
    threshold: 10
    operator: ">"
    evaluation_window: 5m
    severity: medium
    action: notify_runtime_owner
  - alert_key: brevio_cache_hit_rate_drop
    metric: BREVIO_cache_hit_rate
    threshold: 20
    operator: "<"
    evaluation_window: 30m
    severity: medium
    action: notify_runtime_owner
  - alert_key: brevio_gaia_regression
    metric: brevio_gaia_regression_alert
    threshold: 0.5
    operator: ">"
    evaluation_window: 1h
    severity: high
    action: notify_runtime_owner
    description: "GAIA benchmark pass rate dropped >5% from prior week."
  - alert_key: brevio_gaia_pass_rate_critical
    metric: brevio_gaia_pass_rate
    threshold: 0.50
    operator: "<"
    evaluation_window: 24h
    severity: critical
    action: page_primary_on_call
    description: "GAIA benchmark pass rate below 50%."
