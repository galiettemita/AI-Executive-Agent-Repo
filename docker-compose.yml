version: '3.9'

x-common-env: &common-env
  BREVIO_ENV: local
  DATABASE_URL: postgres://brevio:brevio@postgres:5432/brevio?sslmode=disable
  REDIS_URL: redis://redis:6379/0
  TEMPORAL_HOST: temporal:7233
  TEMPORAL_NAMESPACE: default
  SERVICE_VERSION: local

x-runtime-service: &runtime-service
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - brevio
  environment:
    <<: *common-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    temporal:
      condition: service_started

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: brevio
      POSTGRES_PASSWORD: brevio
      POSTGRES_DB: brevio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brevio -d brevio']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - brevio

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - brevio

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: brevio
      POSTGRES_PWD: brevio
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '7233:7233'
    networks:
      - brevio

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_UI_PORT: 8080
    depends_on:
      temporal:
        condition: service_started
    ports:
      - '8088:8080'
    networks:
      - brevio

  gateway:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    environment:
      <<: *common-env
      GATEWAY_LISTEN_ADDR: ':18080'
      GATEWAY_WEBHOOK_SECRET: dev-secret
      IMESSAGE_WEBHOOK_API_KEY: dev-imessage-key
    ports:
      - '18080:18080'

  brain:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: brain
    environment:
      <<: *common-env
      BRAIN_LISTEN_ADDR: ':18081'
    ports:
      - '18081:18081'

  control:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: control
    environment:
      <<: *common-env
      CONTROL_LISTEN_ADDR: ':18082'
      CONTROL_APP_SECRET: dev-secret
    ports:
      - '18082:18082'

  executor:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: executor
    environment:
      <<: *common-env
      EXECUTOR_LISTEN_ADDR: ':18083'
    ports:
      - '18083:18083'

  canvas:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: canvas
    environment:
      <<: *common-env
      CANVAS_LISTEN_ADDR: ':18793'
    ports:
      - '18793:18793'

  temporal-worker:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: temporal-worker
    environment:
      <<: *common-env
      TEMPORAL_WORKER_LISTEN_ADDR: ':18084'
    ports:
      - '18084:18084'

  browser:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: browser
    environment:
      <<: *common-env
      BROWSER_LISTEN_ADDR: ':18090'
    ports:
      - '18090:18090'

  marketing:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: marketing
    environment:
      <<: *common-env
      MARKETING_LISTEN_ADDR: ':18091'
    ports:
      - '18091:18091'

  agents:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: agents
    environment:
      <<: *common-env
      AGENTS_LISTEN_ADDR: ':18092'
    ports:
      - '18092:18092'

  memory-svc:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: memory
    environment:
      <<: *common-env
      MEMORY_LISTEN_ADDR: ':18093'
    ports:
      - '18093:18093'

  router:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: router
    environment:
      <<: *common-env
      ROUTER_LISTEN_ADDR: ':18094'
    ports:
      - '18094:18094'

  cron:
    <<: *runtime-service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cron
    environment:
      <<: *common-env
      CRON_LISTEN_ADDR: ':18095'
    ports:
      - '18095:18095'

  brevio-auth:
    profiles: ['openclaw-extension']
    image: ghcr.io/brevio/auth:v9.3.0
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - '18085:8083'
    networks:
      - brevio

  brevio-profile:
    profiles: ['openclaw-extension']
    image: ghcr.io/brevio/profile:v9.3.0
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - '18086:8084'
    networks:
      - brevio

  brevio-scheduler:
    profiles: ['openclaw-extension']
    image: ghcr.io/brevio/scheduler:v9.3.0
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - '18087:8085'
    networks:
      - brevio

  brevio-metrics:
    profiles: ['openclaw-extension']
    image: ghcr.io/brevio/metrics:v9.3.0
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - '19090:9090'
    networks:
      - brevio

  brevio-edge-relay:
    profiles: ['openclaw-extension']
    image: ghcr.io/brevio/edge-relay:v9.3.0
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - '18088:8086'
    networks:
      - brevio

volumes:
  postgres_data:
  redis_data:

networks:
  brevio:
    driver: bridge
