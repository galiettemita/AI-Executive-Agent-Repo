version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: executive_ai_agent_postgres
    environment:
      POSTGRES_USER: executive
      POSTGRES_PASSWORD: executive
      POSTGRES_DB: executive_ai_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U executive -d executive_ai_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: executive_ai_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
