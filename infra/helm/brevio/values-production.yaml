    image:
      tag: v9.3.0
  profile:
    image:
      tag: v9.3.0
  scheduler:
    image:
      tag: v9.3.0
  metrics:
    image:
      tag: v9.3.0
  edge-relay:
    image:
      tag: v9.3.0
