replicaCount: 3
image:
  repository: ghcr.io/brevio/gateway
  tag: v9.2.0
service:
  type: ClusterIP
  port: 8080
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
pdb:
  enabled: true
  minAvailable: 1
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
mtls:
  enabled: false
  issuerName: brevio-internal-ca-issuer
  issuerKind: ClusterIssuer
  duration: 2160h
  renewBefore: 720h
