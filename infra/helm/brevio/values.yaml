global:
  environment: local
  namespace: brevio-system
  imagePullPolicy: IfNotPresent
  defaultResources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

serviceAccount:
  create: true
  name: ""

gateway:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/brevio/gateway
    tag: v9.3.0
  service:
    port: 8080
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
  mtls:
    enabled: true

brain:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/brevio/brain
    tag: v9.3.0
  service:
    port: 8081
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
  mtls:
    enabled: true

hands:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/brevio/executor
    tag: v9.3.0
  service:
    port: 8082
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
  mtls:
    enabled: true

control:
  enabled: true

canvas:
  enabled: true

temporalWorker:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/brevio/temporal-worker
    tag: v9.3.0
  service:
    port: 7233
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8

grpc:
  executor:
    port: 50051
    enabled: true
  hands:
    port: 50052
    enabled: true

clusterName: brevio-staging

karpenter:
  enabled: false
  nodeRoleName: brevio-karpenter-node

autoscaling:
  brain:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilization: 65
    targetMemoryUtilization: 75
    customMetrics:
      queueDepthTarget: "50"
  gateway:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilization: 60
    targetMemoryUtilization: 70
  hands:
    enabled: true
    minReplicas: 2
    maxReplicas: 15
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  executor:
    enabled: true
    minReplicas: 2
    maxReplicas: 15
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  temporal-worker:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 75
    targetMemoryUtilization: 85

resources:
  brain:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  gateway:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  hands:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  executor:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  temporal-worker:
    requests:
      cpu: "1000m"
      memory: "1Gi"
    limits:
      cpu: "4000m"
      memory: "4Gi"
  control:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  canvas:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

podDisruptionBudget:
  brain:
    enabled: true
    minAvailable: 1
  gateway:
    enabled: true
    minAvailable: 2
  hands:
    enabled: true
    minAvailable: 1
  temporal-worker:
    enabled: true
    minAvailable: 1

additionalServices:
  auth:
    enabled: true
    replicaCount: 2
    containerPort: 8083
    servicePort: 8083
    image:
      repository: ghcr.io/brevio/auth
      tag: v9.3.0
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
  profile:
    enabled: true
    replicaCount: 2
    containerPort: 8084
