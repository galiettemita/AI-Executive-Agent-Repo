name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -q

      - name: Prompt-injection fuzzing
        run: |
          PYTHONPATH=. pytest -q tests/test_prompt_injection_fuzz.py

      - name: Type checks (mypy)
        run: |
          python -m pip install mypy
          python -m mypy \
            app/services/llm_client.py \
            app/api/internal/llm.py \
            app/api/routes/v1_gateway.py \
            app/api/routes/v1_core.py \
            app/api/internal/platform.py \
            --ignore-missing-imports \
            --follow-imports=skip

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt
