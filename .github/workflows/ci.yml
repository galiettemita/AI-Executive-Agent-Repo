name: ci-openclaw

on:
  pull_request:
  push:
    branches: [main, codex/**]

concurrency:
  group: ci-openclaw-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_format:
    name: 1. Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: make lint
      - run: bash packages/proto/scripts/lint.sh

  schema_validate:
    name: 2. Schema Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go test ./internal/contracts -run "TestOpenAPIV9EndpointParityClosure|TestJSONSchemaClosure|TestOpenClawSeedMigrationCountsAndModes" -count=1

  unit_tests:
    name: 3. Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go test ./... -count=1

  integration_tests:
    name: 4. Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go test ./internal/integration -count=1

  contract_tests:
    name: 5. Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go test ./internal/contracts -count=1

  llm_evals:
    name: 5b. LLM Evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: bash scripts/run-evals.sh

  security_scan:
    name: 6. Security Scan
    runs-on: ubuntu-latest
    env:
      CI: "true"
      REQUIRE_SECURITY_TOOLS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Semgrep SAST scan
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep
          mkdir -p artifacts/security
          semgrep scan --config auto --severity ERROR --sarif --output artifacts/security/semgrep.sarif --error
      - run: bash scripts/security/run_security_validation.sh
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-security-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            artifacts/security/**
            sbom.spdx.json

  migration_safety:
    name: 7. Migration Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/database/verify_postgres_migrations.sh

  v10_acceptance_gates:
    name: 7b. V10+ Acceptance Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: V10+ acceptance gates
        run: go test ./internal/contracts -run "TestAcceptanceGatesV10|TestAcceptanceGatesV101|TestAcceptanceGatesV102V103|TestAcceptanceGatesV104|TestAcceptanceGatesOpenClaw" -count=1
      - name: Quarantine enforcement
        run: |
          # Verify TS service quarantine is in place
          test -f services/NON_PRODUCTION.md
          test -f services/.ci-quarantine.yaml
          # ci.yaml is the main CI workflow; ci.yml extends for V10+ gates
          test -f .github/workflows/ci.yaml
      - name: Trivy CVE scan
        run: |
          if command -v trivy &>/dev/null; then
            trivy fs --exit-code 1 --severity HIGH,CRITICAL --skip-dirs node_modules .
          else
            echo "trivy not installed, skipping (install for local CI)"
          fi

  build_push:
    name: 8. Build & Push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make docker-build

  deploy_staging:
    name: 9. Deploy Staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build_push]
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        id: oidc_auth
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION != '' && env.AWS_REGION || 'us-east-1' }}
      - name: Configure AWS credentials (access key fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' || steps.oidc_auth.outcome == 'failure' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION != '' && env.AWS_REGION || 'us-east-1' }}
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "KUBE_CONFIG_STAGING not set; skipping staging deploy."
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          if printf '%s' "${KUBE_CONFIG_STAGING}" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Loaded base64-encoded staging kubeconfig secret."
          else
            printf '%s' "${KUBE_CONFIG_STAGING}" > "$HOME/.kube/config"
            echo "KUBE_CONFIG_STAGING not valid base64; loaded raw kubeconfig content."
          fi
          if grep -q "command: aws" "$HOME/.kube/config"; then
            if ! command -v aws >/dev/null 2>&1; then
              echo "aws CLI is required by kubeconfig exec auth but is not available." >&2
              exit 1
            fi
            if ! aws sts get-caller-identity >/dev/null 2>&1; then
              echo "EKS kubeconfig requires AWS credentials. Configure AWS_ROLE_TO_ASSUME (preferred) or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets." >&2
              exit 1
            fi
          fi
          kubectl config current-context >/dev/null
      - name: Deploy staging
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
          WAIT_FOR_ROLLOUT: "true"
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "KUBE_CONFIG_STAGING not set; skipping staging deploy."
            exit 0
          fi
          bash scripts/deploy/helm_rollout.sh
      - name: Staging smoke tests
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "KUBE_CONFIG_STAGING not set; skipping staging smoke tests."
            exit 0
          fi
          bash scripts/deploy/run_staging_smoke_tests.sh
      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-artifacts-${{ github.run_id }}
          path: artifacts/deploy/staging_smoke_test_report.json
          if-no-files-found: warn

  deploy_production:
    name: 10. Deploy Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [deploy_staging]
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        id: oidc_auth
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION != '' && env.AWS_REGION || 'us-east-1' }}
      - name: Configure AWS credentials (access key fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' || steps.oidc_auth.outcome == 'failure' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION != '' && env.AWS_REGION || 'us-east-1' }}
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "KUBE_CONFIG_PRODUCTION not set; skipping production deploy."
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          if printf '%s' "${KUBE_CONFIG_PRODUCTION}" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Loaded base64-encoded production kubeconfig secret."
          else
            printf '%s' "${KUBE_CONFIG_PRODUCTION}" > "$HOME/.kube/config"
            echo "KUBE_CONFIG_PRODUCTION not valid base64; loaded raw kubeconfig content."
          fi
          if grep -q "command: aws" "$HOME/.kube/config"; then
            if ! command -v aws >/dev/null 2>&1; then
              echo "aws CLI is required by kubeconfig exec auth but is not available." >&2
              exit 1
            fi
            if ! aws sts get-caller-identity >/dev/null 2>&1; then
              echo "EKS kubeconfig requires AWS credentials. Configure AWS_ROLE_TO_ASSUME (preferred) or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets." >&2
              exit 1
            fi
          fi
          kubectl config current-context >/dev/null
      - name: Deploy production
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
          WAIT_FOR_ROLLOUT: "true"
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "KUBE_CONFIG_PRODUCTION not set; skipping production deploy."
            exit 0
          fi
          bash scripts/deploy/helm_rollout.sh
      - name: Production canary gate
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
          CANARY_ERROR_RATE_PCT: ${{ secrets.CANARY_ERROR_RATE_PCT }}
          CANARY_P99_RATIO: ${{ secrets.CANARY_P99_RATIO }}
          ALLOW_CONDITIONAL_MANUAL: "1"
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "KUBE_CONFIG_PRODUCTION not set; skipping production canary gate."
            exit 0
          fi
          bash scripts/deploy/check_production_canary_window.sh
      - name: Production post-deploy validation gate
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
          CANARY_ERROR_RATE_PCT: ${{ secrets.CANARY_ERROR_RATE_PCT }}
          CANARY_P99_RATIO: ${{ secrets.CANARY_P99_RATIO }}
          SLO_WINDOW_MINUTES: "60"
          SLO_P50_LATENCY_SECONDS: ${{ secrets.SLO_P50_LATENCY_SECONDS }}
          SLO_P99_LATENCY_SECONDS: ${{ secrets.SLO_P99_LATENCY_SECONDS }}
          SLO_SKILL_SUCCESS_RATE_PCT: ${{ secrets.SLO_SKILL_SUCCESS_RATE_PCT }}
          SLO_DELIVERY_SUCCESS_RATE_PCT: ${{ secrets.SLO_DELIVERY_SUCCESS_RATE_PCT }}
          GATEWAY_BASE_URL: ${{ secrets.PRODUCTION_GATEWAY_BASE_URL }}
          BRAIN_BASE_URL: ${{ secrets.PRODUCTION_BRAIN_BASE_URL }}
          HANDS_BASE_URL: ${{ secrets.PRODUCTION_HANDS_BASE_URL }}
          ALLOW_CONDITIONAL_MANUAL: "1"
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "KUBE_CONFIG_PRODUCTION not set; skipping production post-deploy validation gate."
            exit 0
          fi
          ALLOW_CONDITIONAL_MANUAL=1 bash scripts/deploy/check_external_phase_transition.sh
          bash scripts/deploy/check_production_deployment_signoff.sh
          bash scripts/deploy/check_production_post_deploy_validation.sh
      - name: Production phase closure bundle
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "KUBE_CONFIG_PRODUCTION not set; skipping production phase closure bundle."
            exit 0
          fi
          bash scripts/deploy/generate_phase_closure_manifest.sh
          bash scripts/deploy/create_phase_handoff_bundle.sh
          bash scripts/deploy/print_phase_status.sh
      - name: Generate final go-live approval packet
        env:
          KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "KUBE_CONFIG_PRODUCTION not set; skipping final go-live approval packet."
            exit 0
          fi
          bash scripts/deploy/generate_final_go_live_approval_packet.sh
      - name: Upload production gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-gate-artifacts-${{ github.run_id }}
          path: |
            artifacts/deploy/external_phase_transition_check.json
            artifacts/deploy/production_deployment_signoff_check.json
            artifacts/deploy/production_canary_check.json
            artifacts/deploy/production_post_deploy_validation.json
            artifacts/deploy/phase_closure_manifest.json
            artifacts/deploy/phase_handoff_bundle.json
            artifacts/deploy/phase_status.txt
            artifacts/deploy/final_go_live_approval_packet.json
            artifacts/deploy/final_go_live_approval_packet.md
            artifacts/deploy/handoff/phase-handoff-*.tar.gz
          if-no-files-found: warn
