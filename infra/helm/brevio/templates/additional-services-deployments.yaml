{{- $root := . -}}
{{- range $name := keys $root.Values.additionalServices | sortAlpha }}
{{- $svc := index $root.Values.additionalServices $name }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brevio.additionalServiceName" (dict "root" $root "name" $name) }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    {{- include "brevio.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "brevio.labels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
    spec:
      serviceAccountName: {{ include "brevio.serviceAccountName" $root }}
      securityContext:
        fsGroup: 65532
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
          env:
            - name: BREVIO_ENV
              value: {{ $root.Values.global.environment | quote }}
            - name: SERVICE_NAME
              value: {{ printf "brevio-%s" $name | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml (default $root.Values.global.defaultResources $svc.resources) | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "brevio.additionalServiceName" (dict "root" $root "name" $name) }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    {{- include "brevio.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.servicePort }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    app.kubernetes.io/component: {{ $name }}
{{- if and $svc.hpa $svc.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "brevio.additionalServiceName" (dict "root" $root "name" $name) }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    {{- include "brevio.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "brevio.additionalServiceName" (dict "root" $root "name" $name) }}
  minReplicas: {{ $svc.hpa.minReplicas }}
  maxReplicas: {{ $svc.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ default 70 $svc.hpa.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
{{- end }}
