name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          ENV: dev
          DATABASE_URL: sqlite:///./app.db
          JWT_SECRET: test_jwt_secret
          PII_ENCRYPTION_KEY: dEkqDdDoZOe8lnV0fi9-SWicfi8UNtMvYnrqYH50mPU=
          STATE_SIGNING_SECRET: test_state_signing_secret
          OPENAI_API_KEY: test_key
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PRICE_ID_STARTER: price_dummy
          CHECKOUT_SUCCESS_URL: https://example.com/success
          CHECKOUT_CANCEL_URL: https://example.com/cancel
        run: |
          PYTHONPATH=. pytest -q

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt
