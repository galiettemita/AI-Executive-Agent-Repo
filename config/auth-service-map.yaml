oauth_services:
  - service: google
    provider_url: https://accounts.google.com/o/oauth2
    skills_using: [google-calendar, google-maps, google-workspace, goplaces, spots, local-places, gkeep, youtube-api, veo, gemini-stt, gemini-deep-research, shopping-expert]
    required_scopes: [calendar, contacts.readonly, drive, gmail.modify, photoslibrary.readonly, keep, youtube.readonly]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh_5m_before_expiry
  - service: spotify
    provider_url: https://accounts.spotify.com/authorize
    skills_using: [spotify-web-api, spotify-player, spotify-history]
    required_scopes: [user-modify-playback-state, user-read-playback-state, user-top-read, user-read-recently-played, playlist-modify-public]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh_on_401
  - service: microsoft
    provider_url: https://login.microsoftonline.com/common/oauth2/v2.0
    skills_using: [outlook]
    required_scopes: [Mail.ReadWrite, Calendars.ReadWrite, offline_access]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh_5m_before_expiry
  - service: todoist
    provider_url: https://todoist.com/oauth/authorize
    skills_using: [todoist, recipe-to-list]
    required_scopes: [task:add, data:read, data:read_write]
    token_type: bearer
    refresh_strategy: reauth_on_expiry
  - service: notion
    provider_url: https://api.notion.com/v1/oauth
    skills_using: [notion, better-notion]
    required_scopes: [read_content, update_content, insert_content]
    token_type: bearer
    refresh_strategy: none_non_expiring
  - service: withings
    provider_url: https://account.withings.com/oauth2_user/authorize2
    skills_using: [withings-health]
    required_scopes: [user.metrics, user.activity]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh
  - service: dexcom
    provider_url: https://api.dexcom.com/v2/oauth2/login
    skills_using: [dexcom]
    required_scopes: [egv:read]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh
  - service: ynab
    provider_url: https://app.ynab.com/oauth/authorize
    skills_using: [ynab]
    required_scopes: [read-only, read-write]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh
  - service: monarch
    provider_url: https://api.monarchmoney.com/auth
    skills_using: [monarch-money]
    required_scopes: [transactions, accounts]
    token_type: session_token
    refresh_strategy: reauth_on_expiry
  - service: plaid
    provider_url: https://plaid.com/link
    skills_using: [plaid, copilot-money]
    required_scopes: [transactions, balance, investments, identity]
    token_type: access_token
    refresh_strategy: none_item_based
  - service: ticktick
    provider_url: https://ticktick.com/oauth/authorize
    skills_using: [ticktick]
    required_scopes: [tasks:write, tasks:read]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh
  - service: samsung-smartthings
    provider_url: https://api.smartthings.com/oauth
    skills_using: [samsung-smart-tv]
    required_scopes: [r:devices:*, x:devices:*]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh
  - service: trello
    provider_url: https://trello.com/1/authorize
    skills_using: [trello]
    required_scopes: [read, write]
    token_type: api_key_token
    refresh_strategy: none_non_expiring
  - service: reddit
    provider_url: https://www.reddit.com/api/v1/authorize
    skills_using: [reddit]
    required_scopes: [read, submit, identity]
    token_type: bearer_refresh_token
    refresh_strategy: auto_refresh
  - service: slack
    provider_url: https://slack.com/oauth/v2/authorize
    skills_using: [slack]
    required_scopes: [channels:read, chat:write, reactions:write, users:read]
    token_type: bot_token
    refresh_strategy: none_non_expiring

