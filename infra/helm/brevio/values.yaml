global:
  environment: local
  namespace: brevio-system
  imagePullPolicy: IfNotPresent
  defaultResources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

serviceAccount:
  create: true
  name: ""

gateway:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/brevio/gateway
    tag: v9.3.0
  service:
    port: 8080
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
  mtls:
    enabled: true

brain:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/brevio/brain
    tag: v9.3.0
  service:
    port: 8081
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
  mtls:
    enabled: true

hands:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/brevio/executor
    tag: v9.3.0
  service:
    port: 8082
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
  mtls:
    enabled: true

control:
  enabled: true

canvas:
  enabled: true

temporalWorker:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/brevio/temporal-worker
    tag: v9.3.0
  service:
    port: 7233
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8

additionalServices:
  auth:
    enabled: true
    replicaCount: 2
    containerPort: 8083
    servicePort: 8083
    image:
      repository: ghcr.io/brevio/auth
      tag: v9.3.0
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
