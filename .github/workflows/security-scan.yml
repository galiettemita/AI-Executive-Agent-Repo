name: Security Scans

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly on Monday 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  trivy:
    name: Trivy FS + Config Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: 1
      - name: Trivy scan (config)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: 1

  zap:
    name: OWASP ZAP Baseline
    if: ${{ secrets.ZAP_TARGET_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.ZAP_TARGET_URL }}
