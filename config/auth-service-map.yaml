no_auth_services:
  - service: bluesky
    skills_using: [bluesky]
    notes: app-password auth stored encrypted under service=bluesky
  - service: yahoo-finance
    skills_using: [yahoo-finance, financial-market-analysis]
    notes: no api key required
  - service: lastfm
    skills_using: [lastfm]
    notes: free api key tier
  - service: trakt
    skills_using: [trakt]
    notes: client-id auth
  - service: local-macos
    skills_using: [apple-remind-me, calctl, healthkit-sync, healthkit-sync-apple, apple-mail, apple-mail-search, apple-media, apple-music, apple-contacts, apple-photos, apple-notes, apple-notes-skill, shortcuts-generator, get-focus-mode, mole-mac-cleanup, alter-actions, spotify, things-mac, omnifocus, voice-wake-say, bear-notes, obsidian, craft, gamma]
    notes: no remote auth; edge-agent executes with local macOS permissions
  - service: internal-llm-only
    skills_using: [doing-tasks, plan-my-day, daily-rhythm, morning-manifesto, focus-mode, relationship-skills, thinking-partner, self-improvement]
    notes: no external api; brain-plane llm-only skills

auth_config_storage:
  secret_naming_convention:
    - brevio/{environment}/{service}/client_id
    - brevio/{environment}/{service}/client_secret
  oauth_redirect_uri_pattern: https://auth.brevio.app/callback/{service}
  pkce_required: true
